name: Daily HR Predictions

on:
  schedule:
    # Run at 11:00 AM ET (15:00 UTC) every day
    - cron: '0 15 * * *'
  workflow_dispatch:            # Allow manual trigger from GitHub UI

permissions:
  contents: write               # Needed to push docs/index.html back

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Restore large cache (statcast parquets + model) ──────────────────
      - name: Restore data cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: cache/
          key: mlb-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            mlb-cache-${{ runner.os }}-

      # ── 4. Train if no model exists, otherwise just update data + predict ───
      - name: Run predictor
        run: |
          if [ -f cache/hr_model.joblib ]; then
            echo "Model found – running incremental update + prediction"
            python main.py --predict
          else
            echo "No model – running full train + predict"
            python main.py --train --predict
          fi
        env:
          PYTHONUNBUFFERED: "1"

      # ── 5. Commit the updated site ───────────────────────────────────────────
      - name: Commit updated site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: update predictions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Save cache (including any new statcast data fetched today) ────────
      - name: Save data cache
        if: always()
        uses: actions/cache@v4
        with:
          path: cache/
          key: mlb-cache-${{ runner.os }}-${{ github.run_id }}
